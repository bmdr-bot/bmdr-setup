name: Require PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

jobs:
  check-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Requirements
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Check if PR has required reviews
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            const approvedReviews = reviews.data.filter(r => r.state === 'APPROVED');
            
            if (approvedReviews.length === 0) {
              console.log('❌ PR requires at least 1 approval');
              
              // Post comment
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🛡️ Approval Required
                
                This PR cannot be merged until it receives **human approval**.
                
                **Required:**
                - [ ] Code review by at least 1 reviewer
                - [ ] All CI checks passing
                - [ ] Security scan passed
                
                **Reviewers:** Please review carefully before approving.`
              });
              
              core.setFailed('PR requires human approval');
            } else {
              console.log(`✅ PR has ${approvedReviews.length} approval(s)`);
            }
