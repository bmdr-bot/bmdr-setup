name: Approval Gate

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main]
  
  workflow_dispatch:
    inputs:
      action:
        description: 'Approval action'
        required: true
        type: choice
        options:
          - request
          - approve
          - reject
      request_id:
        description: 'Request ID'
        required: false
        type: string
      reason:
        description: 'Reason (for rejection)'
        required: false
        type: string

jobs:
  check-approval:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Check PR Labels
      id: check-labels
      run: |
        LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
        
        # Check if PR requires approval
        if echo "$LABELS" | grep -q "needs-approval"; then
          echo "requires_approval=true" >> $GITHUB_OUTPUT
        else
          echo "requires_approval=false" >> $GITHUB_OUTPUT
        fi
        
        # Check if PR is security-related
        if echo "$LABELS" | grep -q "security"; then
          echo "security_review=true" >> $GITHUB_OUTPUT
        else
          echo "security_review=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Request Approval
      if: steps.check-labels.outputs.requires_approval == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const pr = context.payload.pull_request;
          
          const body = `## 🛡️ Approval Required
          
          This PR requires manual approval before merge.
          
          **PR:** #${pr.number} - ${pr.title}
          **Author:** @${pr.user.login}
          **Type:** ${steps.check-labels.outputs.security_review == 'true' ? '🔒 Security-related' : 'Standard'}
          
          ### Approval Process
          1. Review the changes carefully
          2. Verify tests pass
          3. Check security implications
          4. Comment with "/approve" to approve
          5. Comment with "/reject [reason]" to reject
          
          **Note:** Only designated approvers can merge this PR.`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
          
          // Add blocked label
          github.rest.issues.addLabels({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['blocked-pending-approval']
          });
    
    - name: Block Merge
      if: steps.check-labels.outputs.requires_approval == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          // Create a failing check to block merge
          github.rest.checks.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: 'approval-gate',
            head_sha: context.payload.pull_request.head.sha,
            status: 'completed',
            conclusion: 'failure',
            output: {
              title: 'Approval Required',
              summary: 'This PR requires manual approval before merge.'
            }
          });

  process-approval:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Process Approval Action
      run: |
        ACTION="${{ github.event.inputs.action }}"
        REQUEST_ID="${{ github.event.inputs.request_id }}"
        REASON="${{ github.event.inputs.reason }}"
        
        echo "Processing $ACTION for request $REQUEST_ID"
        
        case $ACTION in
          request)
            echo "Creating approval request..."
            ;;
          approve)
            echo "Approving request $REQUEST_ID..."
            ;;
          reject)
            echo "Rejecting request $REQUEST_ID: $REASON"
            ;;
        esac
