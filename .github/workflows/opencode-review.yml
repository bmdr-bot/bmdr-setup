name: OpenCode PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  opencode-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install OpenCode
      run: npm install -g opencode-ai@latest
    
    - name: Configure OpenCode
      run: |
        opencode auth add openrouter ${{ secrets.OPENROUTER_API_KEY }}
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    
    - name: Run OpenCode Review
      run: |
        echo "🔍 Running OpenCode review for PR #${{ github.event.pull_request.number }}"
        opencode run "Review this pull request for code quality, security issues, and best practices. Focus on:
        1. Security vulnerabilities (SQL injection, XSS, insecure secrets)
        2. Code quality and maintainability
        3. Test coverage
        4. Performance implications
        5. Compliance with project standards
        
        Provide specific line-by-line feedback where applicable." \
          --model openrouter/anthropic/claude-sonnet-4 \
          --thinking
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Post Review Comment
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reviewOutput = fs.readFileSync('opencode-review.txt', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🤖 OpenCode Review\n\n${reviewOutput}\n\n---\n*This review was generated by OpenCode AI. Human approval is required before merge.*`
          });
