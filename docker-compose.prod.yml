version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-bmdr-app}
    environment:
      - APP_NAME=${APP_NAME:-bmdr-app}
      - APP_ENV=prod
      - APP_PORT=8000
      - APP_HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SECRET_KEY=${SECRET_KEY}
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - app-network

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ${APP_NAME:-bmdr-app}-tunnel
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    restart: always
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
