version: "3.8"

services:
  app:
    build: .
    container_name: $project_slug
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
